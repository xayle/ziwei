---
# ============================================================================
# Kubernetes 完整部署配置文件
# 保存为: k8s-deployment.yaml
# 使用: kubectl apply -f k8s-deployment.yaml
# ============================================================================

---
# 命名空间
apiVersion: v1
kind: Namespace
metadata:
  name: bazi-api
  labels:
    name: bazi-api
    version: v5.3.1

---
# ConfigMap - 应用配置
apiVersion: v1
kind: ConfigMap
metadata:
  name: bazi-api-config
  namespace: bazi-api
  labels:
    app: bazi-api
    component: config
data:
  TZ: "Asia/Shanghai"
  UVICORN_LOG_LEVEL: "info"
  UVICORN_WORKERS: "4"
  DB_PATH: "/app/data/bazi.db"
  ALLOWED_ORIGINS: "https://yourdomain.com,https://api.yourdomain.com"

---
# Secret - 敏感信息 (可选，需要分别创建)
# kubectl create secret generic bazi-api-secret \
#   --from-literal=SECRET_KEY=$(python -c 'import secrets; print(secrets.token_urlsafe(32))') \
#   -n bazi-api

---
# PersistentVolumeClaim - 数据持久化
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: bazi-api-data
  namespace: bazi-api
  labels:
    app: bazi-api
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard  # 或 fast, ssd 等
  resources:
    requests:
      storage: 10Gi

---
# Deployment - 应用部署
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bazi-api
  namespace: bazi-api
  labels:
    app: bazi-api
    version: v5.3.1
  annotations:
    description: BaZi API Service Deployment
spec:
  replicas: 3
  
  selector:
    matchLabels:
      app: bazi-api
  
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  
  template:
    metadata:
      labels:
        app: bazi-api
        version: v5.3.1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    
    spec:
      # ======================================================================
      # Pod行为
      # ======================================================================
      
      # 优雅关闭（给应用时间处理未完成的请求）
      terminationGracePeriodSeconds: 30
      
      # 若Pod失败，k8s会自动重启
      restartPolicy: Always
      
      # DNS策略
      dnsPolicy: ClusterFirst
      
      # ======================================================================
      # 安全上下文
      # ======================================================================
      securityContext:
        fsGroup: 1000
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      
      # ======================================================================
      # 容器定义
      # ======================================================================
      containers:
      - name: bazi-api
        # 镜像
        image: your-registry/bazi-api:5.3.1
        imagePullPolicy: IfNotPresent
        
        # ======================================================================
        # 端口
        # ======================================================================
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        
        # ======================================================================
        # 环境变量 (来自ConfigMap)
        # ======================================================================
        envFrom:
        - configMapRef:
            name: bazi-api-config
        
        # 额外的环境变量
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        
        # ======================================================================
        # 卷挂载
        # ======================================================================
        volumeMounts:
        - name: data
          mountPath: /app/data
        - name: logs
          mountPath: /app/logs
        
        # ======================================================================
        # 存活性探针 (Liveness Probe)
        # 告诉k8s: 这个Pod还活着吗？
        # ======================================================================
        livenessProbe:
          httpGet:
            path: /health
            port: http
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        
        # ======================================================================
        # 就绪性探针 (Readiness Probe)
        # 告诉k8s: 这个Pod可以接收流量了吗？
        # ======================================================================
        readinessProbe:
          httpGet:
            path: /ready
            port: http
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        
        # ======================================================================
        # 启动探针 (Startup Probe - K8s 1.18+)
        # 针对启动慢的应用
        # ======================================================================
        startupProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 30  # 30 * 10 = 300秒内必须就绪
        
        # ======================================================================
        # 资源请求和限制
        # ======================================================================
        resources:
          requests:
            cpu: "500m"
            memory: "256Mi"
          limits:
            cpu: "2000m"
            memory: "1Gi"
        
        # ======================================================================
        # 容器安全上下文
        # ======================================================================
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
            add:
            - NET_BIND_SERVICE  # 必要时才添加
        
        # ======================================================================
        # 生命周期钩子
        # ======================================================================
        lifecycle:
          preStop:
            exec:
              # 优雅关闭：等待现有请求完成
              command: ["/bin/sleep", "15"]
      
      # ======================================================================
      # 卷定义
      # ======================================================================
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: bazi-api-data
      - name: logs
        emptyDir: {}  # 临时日志存储
      
      # ======================================================================
      # Pod调度
      # ======================================================================
      affinity:
        # Pod之间的反亲和性 (确保不在同一节点)
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - bazi-api
              topologyKey: kubernetes.io/hostname
        
        # 节点亲和性 (可选: 在特定节点池上运行)
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: node-type
                operator: In
                values:
                - app  # 节点标签: node-type=app

---
# Service - 服务发现和负载均衡
apiVersion: v1
kind: Service
metadata:
  name: bazi-api
  namespace: bazi-api
  labels:
    app: bazi-api
  annotations:
    description: BaZi API Service Endpoint
spec:
  type: LoadBalancer  # 可选值: ClusterIP (内部), NodePort, LoadBalancer
  selector:
    app: bazi-api
  ports:
  - name: http
    port: 80
    targetPort: 8000
    protocol: TCP
  sessionAffinity: None
  # sessionAffinityConfig:
  #   clientIP:
  #     timeoutSeconds: 10800

---
# Ingress - 外部访问
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bazi-api
  namespace: bazi-api
  labels:
    app: bazi-api
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
  - hosts:
    - api.yourdomain.com
    secretName: bazi-api-tls
  rules:
  - host: api.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: bazi-api
            port:
              number: 80

---
# HorizontalPodAutoscaler - 自动扩展
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: bazi-api
  namespace: bazi-api
  labels:
    app: bazi-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: bazi-api
  
  minReplicas: 2
  maxReplicas: 10
  
  metrics:
  # 基于CPU使用率
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  
  # 基于内存使用率
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30

---
# PodDisruptionBudget - 故障恢复策略
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: bazi-api
  namespace: bazi-api
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: bazi-api

---
# NetworkPolicy - 网络隔离 (可选)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: bazi-api
  namespace: bazi-api
spec:
  podSelector:
    matchLabels:
      app: bazi-api
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8000
  egress:
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53    # DNS
  - to:
    - podSelector:
        matchLabels:
          app: bazi-api
    ports:
    - protocol: TCP
      port: 8000
