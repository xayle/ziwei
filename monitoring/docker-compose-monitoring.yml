version: '3.8'

services:
  # BaZi API 服务
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bazi-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./data/mingli.db
      - SECRET_KEY=your-secret-key-here
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - prometheus
    networks:
      - monitoring
    command: >
      sh -c "python -m pip install prometheus-client && 
             uvicorn run:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Prometheus 监控服务
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./alerts.yml:/etc/prometheus/alerts.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - monitoring
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Grafana 可视化仪表板
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - monitoring
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # AlertManager (可选) - 用于告警管理
  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - monitoring
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  alertmanager_data:
    driver: local

networks:
  monitoring:
    driver: bridge

# 使用说明：
# 
# 启动所有服务：
#   docker-compose -f docker-compose-monitoring.yml up -d
#
# 查看日志：
#   docker-compose -f docker-compose-monitoring.yml logs -f app
#   docker-compose -f docker-compose-monitoring.yml logs -f prometheus
#   docker-compose -f docker-compose-monitoring.yml logs -f grafana
#
# 访问地址：
#   API: http://localhost:8000
#   Prometheus: http://localhost:9090
#   Grafana: http://localhost:3000 (admin/admin)
#   AlertManager: http://localhost:9093
#
# 停止所有服务：
#   docker-compose -f docker-compose-monitoring.yml down
#
# 删除所有数据：
#   docker-compose -f docker-compose-monitoring.yml down -v
