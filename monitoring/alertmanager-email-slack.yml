# AlertManager 告警配置 - Email & Slack 完整示例
# 根据您的邮件和 Slack 设置修改此文件

global:
  # 全局告警超时
  resolve_timeout: 5m
  
  # SMTP 全局配置 (Gmail 示例)
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_auth_username: 'your-email@gmail.com'           # 修改为您的 Gmail
  smtp_auth_password: 'your-app-password'               # 修改为您的 App Password
  smtp_from: 'alerts@baziservice.com'
  smtp_require_tls: true
  
  # 模板文件路径
  templates: []

# 告警路由配置
route:
  receiver: 'default'
  group_by: ['alertname', 'severity', 'instance']
  
  # 初始分组等待时间
  group_wait: 30s
  
  # 新告警的分组间隔
  group_interval: 5m
  
  # 重复发送告警的间隔
  repeat_interval: 4h
  
  # 子路由规则
  routes:
    # ============ 严重告警 (Critical) ============
    # 立即发送给 OncallTeam，同时发送给 Slack 和 Email
    - match:
        severity: critical
      receiver: 'oncall-critical'
      continue: true
      group_wait: 0s           # 立即发送，不等待其他告警
      group_interval: 5m
      repeat_interval: 1h      # 每小时重复一次
    
    # ============ 警告告警 (Warning) ============
    # 等待 5 分钟后发送
    - match:
        severity: warning
      receiver: 'team-warning'
      group_wait: 5m
      group_interval: 15m
      repeat_interval: 6h      # 每6小时重复一次
    
    # ============ 信息告警 (Info) ============
    # 只发送给 Email，每天一次
    - match:
        severity: info
      receiver: 'daily-summary'
      group_wait: 1h
      group_interval: 1h
      repeat_interval: 24h
    
    # ============ 数据库性能告警 ============
    # 高优先级，发送给 DBA 团队
    - match:
        component: database
        alertname: 'DatabaseLatency'
      receiver: 'database-team'
      group_by: ['alertname', 'instance']
      group_wait: 1m
      repeat_interval: 2h
    
    # ============ 安全和认证告警 ============
    # 最高优先级，立即发送给安全团队
    - match:
        component: security
      receiver: 'security-team'
      group_wait: 0s           # 立即发送
      repeat_interval: 30m     # 每 30 分钟重复一次
    
    # ============ API 性能告警 ============
    # 发送给开发团队和 Slack
    - match:
        component: api
      receiver: 'api-performance'
      group_wait: 2m
      repeat_interval: 3h

# ============================================================================
# 接收器配置
# ============================================================================

receivers:
  # 默认接收器
  - name: 'default'
    email_configs:
      - to: 'devops@yourcompany.com'

  # ============ OncallTeam - 严重告警 ============
  - name: 'oncall-critical'
    email_configs:
      - to: 'oncall@yourcompany.com'
        headers:
          Subject: '[CRITICAL ALERT] BaZi Service'
        html: |
          <h1 style="color: red;">🚨 严重告警</h1>
          <p><strong>告警名称:</strong> {{ .GroupLabels.alertname }}</p>
          <p><strong>严重级别:</strong> {{ .GroupLabels.severity }}</p>
          <p><strong>受影响实例:</strong> {{ .GroupLabels.instance }}</p>
          <p><strong>告警时间:</strong> {{ .GroupLabels.timestamp }}</p>
          <hr>
          <h3>告警详情:</h3>
          {{ range .Alerts }}
          <p><strong>{{ .Labels.alertname }}</strong></p>
          <p>{{ .Annotations.description }}</p>
          <p>{{ .Annotations.summary }}</p>
          {{ end }}
    
    slack_configs:
      - api_url: '<slack-webhook-removed><workspace>/<channel>/<secret>'  # 修改为您的 Webhook URL
        channel: '#critical-alerts'
        title: '🚨 Critical Alert: {{ .GroupLabels.alertname }}'
        title_link: 'http://alertmanager:9093'
        text: |
          *Severity:* CRITICAL
          *Component:* {{ .GroupLabels.component | default "unknown" }}
          {{ range .Alerts.Firing }}
          • {{ .Labels.alertname }}: {{ .Annotations.summary }}
          {{ end }}
        color: 'danger'
        send_resolved: false
        actions:
          - type: button
            text: 'View in AlertManager'
            url: 'http://alertmanager:9093'
        mrkdwn_in:
          - text
          - title
    
    # PagerDuty 集成 (可选)
    # pagerduty_configs:
    #   - service_key: 'YOUR_PAGERDUTY_KEY'
    #     description: '{{ .GroupLabels.alertname }}: {{ (index .Alerts 0).Annotations.summary }}'
  
  # ============ TeamWarning - 警告告警 ============
  - name: 'team-warning'
    email_configs:
      - to: 'team@yourcompany.com'
        headers:
          Subject: '[WARNING] BaZi Service Alert'
    
    slack_configs:
      - api_url: '<slack-webhook-removed><workspace>/<channel>/<secret>'
        channel: '#warnings'
        title: '⚠️ Warning: {{ .GroupLabels.alertname }}'
        text: |
          *Component:* {{ .GroupLabels.component | default "unknown" }}
          {{ range .Alerts.Firing }}
          • {{ .Labels.alertname }}: {{ .Annotations.summary }}
          {{ end }}
        color: 'warning'
        send_resolved: true

  # ============ DailyReport - 每日摘要 ============
  - name: 'daily-summary'
    email_configs:
      - to: 'team@yourcompany.com'
        headers:
          Subject: '[SUMMARY] BaZi Service Daily Report'

  # ============ DatabaseTeam - 数据库告警 ============
  - name: 'database-team'
    email_configs:
      - to: 'dba@yourcompany.com'
        cc:
          - 'team-lead@yourcompany.com'
        headers:
          Subject: '[DATABASE] Performance Alert'
    
    slack_configs:
      - api_url: '<slack-webhook-removed><workspace>/<channel>/<secret>'
        channel: '#database-alerts'
        title: '🗄️ Database Alert: {{ .GroupLabels.alertname }}'
        color: 'warning'

  # ============ SecurityTeam - 安全告警 ============
  - name: 'security-team'
    email_configs:
      - to: 'security@yourcompany.com'
        cc:
          - 'sec-mgmt@yourcompany.com'
        headers:
          Subject: '[SECURITY] Urgent: {{ .GroupLabels.alertname }}'
    
    slack_configs:
      - api_url: '<slack-webhook-removed><workspace>/<channel>/<secret>'
        channel: '#security-alerts'
        title: '🔐 Security Alert: {{ .GroupLabels.alertname }}'
        text: |
          🚨 *URGENT SECURITY ALERT* 🚨
          *Raw Alert:*
          ```
          {{ range .Alerts }}
          - {{ .Labels.alertname }}
            Description: {{ .Annotations.description }}
            Details: {{ .Annotations.summary }}
          {{ end }}
          ```
        color: 'danger'
        send_resolved: false

  # ============ APIPerformance - API 性能 ============
  - name: 'api-performance'
    email_configs:
      - to: 'dev-team@yourcompany.com'
    
    slack_configs:
      - api_url: '<slack-webhook-removed><workspace>/<channel>/<secret>'
        channel: '#api-alerts'
        title: '🔧 API Performance: {{ .GroupLabels.alertname }}'
        color: 'warning'

# ============================================================================
# 告警抑制规则 - 防止告警风暴
# ============================================================================

inhibit_rules:
  # Rule 1: 如果服务整个离线，抑制所有其他相关告警
  - source_match:
      alertname: 'ServiceDown'
      severity: 'critical'
    target_match_re:
      alertname: '.*'
    equal: ['service', 'instance']

  # Rule 2: 如果存在严重错误率，抑制低级别的延迟告警
  - source_match:
      severity: 'critical'
      alertname: 'HighErrorRate'
    target_match:
      severity: 'warning'
      alertname: 'HighRequestLatency'
    equal: ['instance']

  # Rule 3: 如果数据库连接失败，抑制慢查询告警
  - source_match:
      component: 'database'
      alertname: 'DatabaseConnectionFailed'
    target_match:
      alertname: 'DatabaseLatency'
    equal: ['instance']

  # Rule 4: 如果已解决，抑制 resolve 消息的发送
  - match:
      alertname: 'InfoAlert'
    target_match:
      severity: 'info'
    equal: ['alertname']

# ============================================================================
# 使用说明
# ============================================================================
#
# 1. 修改以下内容：
#    - smtp_auth_username: 修改为您的 Gmail
#    - smtp_auth_password: 修改为 Google App Password
#    - slack_configs 中的 api_url: 修改为您的 Slack Webhook URL
#    - email_configs 中的 to 地址: 修改为您的团队邮箱
#
# 2. Google App Password 获取：
#    - 访问 https://myaccount.google.com/security
#    - 启用 2-Step Verification
#    - 生成 App Password
#    - 复制 16 位密码到 smtp_auth_password
#
# 3. Slack Webhook 获取：
#    - 访问 https://api.slack.com/apps
#    - Create New App
#    - Incoming Webhooks → Add New Webhook to Workspace
#    - 选择通知频道
#    - 复制 Webhook URL
#
# 4. 启用此配置：
#    - 将文件放在 /etc/alertmanager/alertmanager.yml
#    - 重启 AlertManager 容器
#
# 5. 验证：
#    - 访问 http://localhost:9093 查看 AlertManager UI
#    - 检查邮件收件箱
#    - 查看 Slack 频道中的消息
