#     - url: 'http://localhost:5001/alert'
#       send_resolved: true
#
# 使用说明：
#
# 1. 根据您的需求配置接收器
# 2. 将此文件放在容器中：/etc/alertmanager/alertmanager.yml
# 3. Prometheus 会自动将告警发送到 AlertManager
# 4. AlertManager 会根据路由规则和接收器配置转发通知
# 5. 访问 http://localhost:9093 查看告警管理界面
