# AlertManager 配置文件
# 用于告警路由和通知管理

global:
  # 仅保留全局超时；不启用 SMTP / Email / Slack 推送
  resolve_timeout: 5m

# 告警路由配置
route:
  # 默认接收器
  receiver: 'default'
  
  # 分组
  group_by: ['alertname', 'cluster', 'service']
  
  # 分组等待时间（等待同类告警一起发送）
  group_wait: 10s
  
  # 分组间隔（同类告警重新分组间隔）
  group_interval: 10s
  
  # 重复间隔（重复发送告警）
  repeat_interval: 12h
  
  # 子路由规则
  routes:
    # 严重告警（critical）
    - match:
        severity: critical
      receiver: 'critical-alerts'
      continue: true
      group_wait: 0s        # 立即发送，不等待
      repeat_interval: 1h   # 每小时重复一次
    
    # 警告告警（warning）
    - match:
        severity: warning
      receiver: 'warning-alerts'
      group_wait: 5m        # 等待5分钟后发送
      repeat_interval: 6h   # 每6小时重复一次
    
    # 信息告警（info）
    - match:
        severity: info
      receiver: 'info-alerts'
      group_wait: 30m       # 等待30分钟后发送
      repeat_interval: 24h  # 每24小时重复一次
    
    # 数据库相关告警
    - match:
        component: database
      receiver: 'database-alerts'
      group_by: ['alertname', 'component']
      group_wait: 1m
    
    # 认证相关告警
    - match:
        component: auth
      receiver: 'security-alerts'
      group_by: ['alertname', 'component']
      group_wait: 0s        # 安全告警立即发送

# 接收器配置
receivers:
  # 默认接收器（可选）
  - name: 'default'
    # 仅在 AlertManager UI 中查看，不做外部推送
  
  # 严重告警接收器
  - name: 'critical-alerts'
    # 当前不配置外部接收器
  
  # 警告告警接收器
  - name: 'warning-alerts'
    # 当前不配置外部接收器
  
  # 信息告警接收器
  - name: 'info-alerts'
    # 可为空（不发送通知）
  
  # 数据库告警接收器
  - name: 'database-alerts'
    # 当前不配置外部接收器
  
  # 安全告警接收器
  - name: 'security-alerts'
    # 当前不配置外部接收器

# 抑制规则（用于防止告警风暴）
inhibit_rules:
  # 如果服务离线，抑制其他所有告警
  - source_match:
      alertname: 'ServiceDown'
    target_match_re:
      alertname: '.*'
    equal: ['service', 'instance']
  
  # 如果存在严重错误率，抑制低级别的延迟告警
  - source_match:
      severity: 'critical'
      alertname: 'CriticalErrorRate'
    target_match:
      severity: 'warning'
      alertname: 'HighRequestLatency'
    equal: ['service']

# 使用说明：
#
# 1. 当前默认不做任何外部推送
# 2. 将此文件放在容器中：/etc/alertmanager/alertmanager.yml
# 3. Prometheus 会自动将告警发送到 AlertManager
# 4. AlertManager 负责路由、分组、抑制与状态维护
# 5. 访问 http://localhost:9093 查看告警管理界面
