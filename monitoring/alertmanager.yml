# AlertManager 配置文件
# 用于告警路由和通知管理

global:
  # 全局 SMTP 配置（用于邮件通知，可选）
  resolve_timeout: 5m
  # smtp_smarthost: 'smtp.example.com:587'
  # smtp_auth_username: 'alerting@example.com'
  # smtp_auth_password: 'password'
  # smtp_from: 'alerting@example.com'

# 告警路由配置
route:
  # 默认接收器
  receiver: 'default'
  
  # 分组
  group_by: ['alertname', 'cluster', 'service']
  
  # 分组等待时间（等待同类告警一起发送）
  group_wait: 10s
  
  # 分组间隔（同类告警重新分组间隔）
  group_interval: 10s
  
  # 重复间隔（重复发送告警）
  repeat_interval: 12h
  
  # 子路由规则
  routes:
    # 严重告警（critical）
    - match:
        severity: critical
      receiver: 'critical-alerts'
      continue: true
      group_wait: 0s        # 立即发送，不等待
      repeat_interval: 1h   # 每小时重复一次
    
    # 警告告警（warning）
    - match:
        severity: warning
      receiver: 'warning-alerts'
      group_wait: 5m        # 等待5分钟后发送
      repeat_interval: 6h   # 每6小时重复一次
    
    # 信息告警（info）
    - match:
        severity: info
      receiver: 'info-alerts'
      group_wait: 30m       # 等待30分钟后发送
      repeat_interval: 24h  # 每24小时重复一次
    
    # 数据库相关告警
    - match:
        component: database
      receiver: 'database-alerts'
      group_by: ['alertname', 'component']
      group_wait: 1m
    
    # 认证相关告警
    - match:
        component: auth
      receiver: 'security-alerts'
      group_by: ['alertname', 'component']
      group_wait: 0s        # 安全告警立即发送

# 接收器配置
receivers:
  # 默认接收器（可选）
  - name: 'default'
    # 可配置为邮件、Slack 等
  
  # 严重告警接收器
  - name: 'critical-alerts'
    # email_configs:
    #   - to: 'oncall@example.com'
    #     smarthost: 'smtp.example.com:587'
    #     auth_username: 'alerting@example.com'
    #     auth_password: 'password'
    #     from: 'alerting@example.com'
    #     headers:
    #       Subject: '[CRITICAL] {{ .GroupLabels.alertname }}'
    # 
    # slack_configs:
    #   - api_url: '<slack-webhook-removed>'
    #     channel: '#critical-alerts'
    #     title: 'Critical Alert: {{ .GroupLabels.alertname }}'
    #     text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
    #     send_resolved: true
    # 
    # pagerduty_configs:
    #   - service_key: 'YOUR_SERVICE_KEY'
    #     description: '{{ .GroupLabels.alertname }}: {{ .Alerts.Firing | len }} alert(s)'
  
  # 警告告警接收器
  - name: 'warning-alerts'
    # webhook_configs:
    #   - url: 'http://localhost:5000/alert'
    #     send_resolved: true
  
  # 信息告警接收器
  - name: 'info-alerts'
    # 可为空（不发送通知）
  
  # 数据库告警接收器
  - name: 'database-alerts'
    # email_configs:
    #   - to: 'dba@example.com'
  
  # 安全告警接收器
  - name: 'security-alerts'
    # email_configs:
    #   - to: 'security@example.com'
    # slack_configs:
    #   - api_url: '<slack-webhook-removed>'
    #     channel: '#security-alerts'

# 抑制规则（用于防止告警风暴）
inhibit_rules:
  # 如果服务离线，抑制其他所有告警
  - source_match:
      alertname: 'ServiceDown'
    target_match_re:
      alertname: '.*'
    equal: ['service', 'instance']
  
  # 如果存在严重错误率，抑制低级别的延迟告警
  - source_match:
      severity: 'critical'
      alertname: 'CriticalErrorRate'
    target_match:
      severity: 'warning'
      alertname: 'HighRequestLatency'
    equal: ['service']

# 具体的接收器配置示例
