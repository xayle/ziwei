<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>紫微占位 · 暂未开放</title>
  <style>
    :root {
      --bg: #f7f3ea;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #b91c1c;
      --line: #e5e7eb;
      --shadow: 0 16px 48px rgba(0,0,0,.06);
    }
    * { box-sizing:border-box; }
    body {
      margin:0; min-height:100vh;
      font-family: "Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
      color:var(--text);
      background:radial-gradient(1200px circle at 20% 10%, rgba(185,28,28,.05), transparent 42%),
                 linear-gradient(180deg, #fdfaf5 0%, #f2efe7 100%);
      display:flex; align-items:center; justify-content:center; padding:32px;
    }
    .card {
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:var(--shadow);
      max-width:520px;
      width:100%;
      padding:28px 26px;
      text-align:center;
    }
    h1 { margin:0 0 10px; font-size:22px; letter-spacing:0.4px; }
    p  { margin:10px 0; color:var(--muted); line-height:1.6; }
    .badge { display:inline-flex; align-items:center; gap:8px; padding:8px 12px; border-radius:999px; background:#fef2f2; color:#b91c1c; border:1px solid rgba(185,28,28,.2); font-weight:600; }
    .actions { margin-top:16px; display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
    a.btn {
      text-decoration:none;
      border:1px solid var(--line);
      padding:10px 14px;
      border-radius:12px;
      color:var(--text);
      background:#fff;
      transition:transform .08s, box-shadow .15s;
    }
    a.btn:hover { box-shadow:0 12px 32px rgba(0,0,0,.06); }
    a.btn:active { transform:scale(.98); }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">紫微 · 暂未开放</div>
    <h1>紫微功能正在建设中</h1>
    <p>当前接口返回 unavailable，敬请期待后续版本。您可以先使用八字排盘（/static/verify.html）或案例计算功能。</p>
    <div class="actions">
      <a class="btn" href="/static/verify.html">前往八字验证</a>
      <a class="btn" href="/">返回首页</a>
    </div>
  </div>
</body>
</html>
