<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>紫微斗数 命盘</title>
  <style>
    :root {
      --bg:#faf6ef;--panel:#fffdf8;--border:#c8b89a;
      --hdr-bg:#2c1810;--hdr-fg:#f5e6c8;
      --accent:#8b1a1a;--accent2:#1a4a8b;--gold:#c9963a;
      --muted:#6b5b45;--text:#1a1208;--tag-bg:#f0e8d8;
      --main-star:#8b1a1a;--aux-star:#1a4a8b;
      --sha-star:#5a1a1a;--ji-star:#1a5a3a;
      --font-cn:"Noto Serif SC","SimSun","宋体",serif;
      --pw:158px;--ph:138px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:var(--font-cn);min-height:100vh}
    .topbar{background:var(--hdr-bg);color:var(--hdr-fg);display:flex;
      align-items:center;justify-content:space-between;padding:10px 20px;flex-wrap:wrap;gap:10px}
    .topbar h1{font-size:1.3rem;font-weight:700;letter-spacing:.15em;color:var(--gold)}
    .topbar-nav{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .topbar a{color:#c8b89a;text-decoration:none;font-size:.85rem}
    .topbar a:hover{color:var(--gold)}
    .topbar-nav a{color:#c8b89a;text-decoration:none;font-size:.82rem;
      padding:4px 10px;border-radius:8px;border:1px solid rgba(200,184,154,.35);
      transition:background .15s,color .15s}
    .topbar-nav a:hover{background:rgba(200,184,154,.18);color:var(--gold)}
    .form-wrap{max-width:760px;margin:18px auto 0;padding:0 14px}
    .form-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:16px 20px}
    .form-title{font-size:1rem;font-weight:700;margin-bottom:12px;color:var(--accent)}
    .form-row{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end}
    .fg{display:flex;flex-direction:column;gap:4px}
    .fg label{font-size:.78rem;color:var(--muted);font-weight:600}
    .fg input,.fg select{border:1px solid var(--border);border-radius:6px;
      padding:6px 10px;font-size:.92rem;font-family:inherit;background:#fff;color:var(--text)}
    .btn{background:var(--accent);color:#fff;border:none;border-radius:6px;
      padding:8px 22px;font-size:.95rem;cursor:pointer;font-family:inherit}
    .btn:hover{background:#a92020}
    .btn2{background:var(--accent2)}
    .btn2:hover{background:#1a3a7a}
    .status{max-width:960px;margin:8px auto;padding:0 14px;font-size:.85rem;color:var(--muted);min-height:20px}
    .status.err{color:#991b1b}
    .croute{max-width:960px;margin:10px auto 20px;padding:0 14px}
    .croute.hid{display:none}
    .info-hdr{background:var(--hdr-bg);color:var(--hdr-fg);border-radius:8px 8px 0 0;
      padding:10px 16px;display:flex;flex-wrap:wrap;gap:12px;align-items:center;font-size:.88rem}
    .kv{display:flex;gap:4px}
    .kv .k{color:#a89878;font-size:.78rem}
    .kv .v{font-weight:700;color:var(--gold);letter-spacing:.05em}
    .pgrid{
      display:grid;
      grid-template-columns:repeat(4,var(--pw));
      grid-template-rows:repeat(4,var(--ph));
      border:2px solid var(--border);border-top:none;
      background:var(--panel);
    }
    .pal{border:1px solid var(--border);padding:5px 7px;overflow:hidden;
      position:relative;display:flex;flex-direction:column;background:var(--panel);}
    .pal:hover{background:#f5edd8}
    .pcenter{grid-column:2/4;grid-row:2/4;display:flex;flex-direction:column;
      border:1px solid var(--border);background:#fffdf5;padding:10px 14px;overflow:auto}
    .compass{font-size:.62rem;color:#b0957a;position:absolute;bottom:3px;right:4px;opacity:.7}
    .pname{font-size:.7rem;color:var(--muted);font-weight:700;margin-bottom:3px;
      border-bottom:1px solid #e8dcc8;padding-bottom:2px}
    .db{font-size:.68rem;color:#967858;margin-bottom:4px}
    .stars{flex:1;display:flex;flex-direction:column;gap:1px}
    .sl{font-size:.78rem;line-height:1.4;display:flex;align-items:center;gap:3px;flex-wrap:wrap}
    .sn{font-weight:700}.sn.main{color:var(--main-star)}.sn.aux{color:var(--aux-star)}
    .sn.sha{color:var(--sha-star)}.sn.ji{color:var(--ji-star)}
    .sbr{font-size:.63rem;color:var(--muted);margin-left:1px}
    .shan{font-size:.63rem;background:var(--gold);color:#fff;padding:1px 4px;border-radius:3px}
    .blife,.bbody{font-size:.62rem;padding:1px 5px;border-radius:10px;font-weight:700;display:inline-block}
    .blife{background:var(--accent);color:#fff}.bbody{background:var(--accent2);color:#fff}
    .ct{font-size:.95rem;font-weight:700;color:var(--accent);margin-bottom:8px;
      letter-spacing:.08em;border-bottom:1px solid #e8dcc8;padding-bottom:5px}
    .cs{margin-bottom:8px}
    .cs h3{font-size:.78rem;color:var(--muted);font-weight:700;margin-bottom:4px}
    .dylist{display:flex;flex-wrap:wrap;gap:4px}
    .dyi{font-size:.72rem;padding:3px 7px;border-radius:4px;
      border:1px solid var(--border);background:var(--tag-bg);letter-spacing:.05em}
    .dyi.cur{background:var(--accent);color:#fff;border-color:var(--accent)}
    .lnrow{font-size:.8rem;color:var(--accent2);font-weight:600}
    .wbadge{display:inline-block;font-size:.75rem;padding:2px 9px;border-radius:12px;font-weight:700;letter-spacing:.05em}
    .jw{background:#dbeafe;color:#1e3a8a}.jwo{background:#dcfce7;color:#14532d}
    .jme{background:#fef9c3;color:#713f12}.jea{background:#fef3c7;color:#78350f}
    .jfi{background:#fee2e2;color:#7f1d1d}
    .awrap{max-width:960px;margin:16px auto 30px;padding:0 14px}
    .awrap.hid{display:none}
    .acard{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:16px 20px}
    .acard h2{font-size:1rem;font-weight:700;color:var(--accent);margin-bottom:12px}
    .atabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
    .tbtn{font-size:.82rem;padding:4px 12px;border:1px solid var(--border);border-radius:20px;
      background:var(--tag-bg);cursor:pointer;font-family:inherit}
    .tbtn.act{background:var(--accent);color:#fff;border-color:var(--accent)}
    .tc{display:none}.tc.act{display:block}
    .pana{margin-bottom:10px;padding:10px;border-radius:6px;background:#faf5ea;border-left:3px solid var(--gold)}
    .pana h4{font-size:.88rem;font-weight:700;color:var(--accent);margin-bottom:5px}
    .pana p{font-size:.83rem;line-height:1.7;color:var(--text);white-space:pre-wrap}
    .sumcard{background:#faf5ea;border-radius:6px;padding:12px;font-size:.85rem;line-height:1.8;white-space:pre-wrap}
    .ftable{width:100%;border-collapse:collapse;font-size:.8rem}
    .ftable th,.ftable td{border:1px solid var(--border);padding:5px 8px;text-align:left}
    .ftable th{background:var(--tag-bg);font-weight:700}
    .flu{color:#14532d}.fqu{color:#1e3a8a}.fke{color:#6b21a8}.fji{color:#7f1d1d}
    /* ── 运势预测 ─────────────────────────────── */
    .fc-section{background:#fff9f0;border:1px solid #e8d8b0;border-radius:8px;padding:14px 16px;margin-bottom:14px}
    .fc-section.fc-cur{border-color:#8b1a1a;box-shadow:0 0 0 2px rgba(139,26,26,.15)}
    .fc-section h3{font-size:.93rem;font-weight:700;color:#8b1a1a;margin-bottom:8px;display:flex;flex-wrap:wrap;align-items:center;gap:8px}
    .fc-score{display:inline-block;font-size:.85rem;font-weight:700;padding:2px 10px;border-radius:10px}
    .fc-score.hi{background:#dcfce7;color:#14532d}.fc-score.md{background:#fef9c3;color:#713f12}.fc-score.lo{background:#fee2e2;color:#7f1d1d}
    .fc-overall{font-size:.85rem;line-height:1.75;color:#1a1208;margin:6px 0 8px}
    .fc-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
    .fc-tag{font-size:.72rem;padding:2px 8px;border-radius:10px;font-weight:600;cursor:default}
    .lv-强{background:#fee2e2;color:#7f1d1d;border:1px solid #fca5a5}
    .lv-中{background:#fef3c7;color:#78350f;border:1px solid #fcd34d}
    .lv-弱{background:#f3f4f6;color:#374151;border:1px solid #d1d5db}
    .fc-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:8px}
    .fc-dim{background:#faf5ea;border-radius:5px;padding:7px 9px;font-size:.8rem;line-height:1.6}
    .fc-dim b{color:#8b1a1a;display:block;margin-bottom:2px;font-size:.78rem}
    .fc-advice{background:#eff6ff;border-left:3px solid #3b82f6;padding:8px 10px;border-radius:0 5px 5px 0;font-size:.8rem;line-height:1.6;white-space:pre-wrap}
    .fc-months{display:flex;flex-direction:column;gap:5px;margin-top:4px}
    .fc-month{border:1px solid #e8d8b0;border-radius:6px;overflow:hidden}
    .fc-month.fc-cur{border-color:#8b1a1a}
    .fc-mhdr{display:flex;align-items:center;gap:8px;padding:7px 11px;cursor:pointer;background:#faf5ea;user-select:none}
    .fc-mhdr:hover{background:#f0e8d0}
    .fc-mhdr .mn{font-size:.82rem;font-weight:700;color:#2c1810;flex:1}
    .fc-mhdr .ms{font-size:.75rem;color:#6b5b45;white-space:nowrap}
    .fc-bar{height:5px;border-radius:3px;background:#e0d4bc;width:54px;flex-shrink:0}
    .fc-bar-fill{height:100%;border-radius:3px;background:#c9963a}
    .fc-mbody{display:none;padding:10px 12px;background:#fffdf8;border-top:1px solid #e8d8b0}
    .fc-mbody.open{display:block}
    .fc-divider{font-size:.8rem;font-weight:700;color:#6b5b45;margin:14px 0 6px;border-bottom:1px solid #e8d8b0;padding-bottom:4px}
    /* ── 补充样式 ───────────────────────── */
    .pgrid-scroll{overflow-x:auto}
    .bln{font-size:.62rem;padding:1px 5px;border-radius:10px;font-weight:700;display:inline-block;background:#1a5a3a;color:#fff}
    .xage{font-size:.58rem;color:#967858;margin-top:auto;padding-top:2px;line-height:1.3}
    .atag{display:inline-block;font-size:.68rem;padding:1px 6px;border-radius:10px;background:#e8f0fe;color:#1a4a8b;border:1px solid #c2d3f5;margin:0 3px 3px 0}
    .lylist{display:flex;flex-wrap:wrap;gap:3px;margin-top:2px}
    .lyi{font-size:.65rem;padding:2px 5px;border-radius:4px;border:1px solid var(--border);background:var(--tag-bg);letter-spacing:.04em;text-align:center;cursor:default}
    .lyi.cur{background:var(--accent);color:#fff;border-color:var(--accent)}
    .fc-palace-tag{font-size:.72rem;background:#f0e8d8;color:#6b5b45;padding:1px 6px;border-radius:8px;font-weight:400}
    .fc-tag-sm{font-size:.65rem;padding:1px 5px;border-radius:8px;font-weight:500}
    .fc-tag-inline{display:flex;gap:3px;align-items:center;overflow:hidden;flex-shrink:0}
    .fc-arr{font-size:.65rem;color:var(--muted);width:12px;flex-shrink:0;text-align:center}
    .fc-empty{color:#6b5b45;padding:20px;font-size:.85rem}
    .tr-cur td{background:#fff3f3}
    /* ── 三段式宫位解读 ───────────────────────────── */
    .pca-c{background:#fffbf0;border-left:3px solid #c9963a;padding:7px 11px;border-radius:0 6px 6px 0;font-size:.82rem;line-height:1.7;margin-bottom:5px}
    .pca-c .lbl{font-size:.63rem;font-weight:700;color:#713f12;background:#fde68a;padding:1px 5px;border-radius:6px;margin-right:5px;vertical-align:middle}
    .pca-exp{font-size:.8rem;line-height:1.8;color:var(--text);margin:7px 0;white-space:pre-line}
    .pca-sug{background:#eff6ff;border-left:3px solid #3b82f6;padding:7px 11px;border-radius:0 6px 6px 0;font-size:.79rem;line-height:1.65;margin-top:5px}
    .pca-sug .lbl{font-size:.63rem;font-weight:700;color:#1d4ed8;margin-right:4px;vertical-align:middle}
    details.pca-d{margin-top:6px}
    details.pca-d summary{font-size:.78rem;color:var(--muted);cursor:pointer;user-select:none;padding:2px 0;list-style:none}
    details.pca-d summary::-webkit-details-marker{display:none}
    details.pca-d summary:hover{color:var(--accent)}
  </style>
</head>
<body>
<div class="topbar">
  <h1>☆ 紫微斗数 · 命盘</h1>
  <nav class="topbar-nav" aria-label="站内导航">
    <a href="/static/verify.html">八字命理</a>
    <a href="/static/cases.html">案例中心</a>
    <a href="/static/dashboard.html">主页</a>
  </nav>
</div>
<div class="form-wrap">
  <div class="form-card">
    <div class="form-title">输入出生信息</div>
    <div class="form-row">
      <div class="fg"><label>出生年</label><input type="number" id="fy" value="2002" min="1900" max="2100" style="width:75px"></div>
      <div class="fg"><label>月</label><input type="number" id="fm" value="3" min="1" max="12" style="width:55px"></div>
      <div class="fg"><label>日</label><input type="number" id="fd" value="13" min="1" max="31" style="width:55px"></div>
      <div class="fg"><label>时(24h)</label><input type="number" id="fh" value="14" min="0" max="23" style="width:55px"></div>
      <div class="fg"><label>分</label><input type="number" id="fmin" value="55" min="0" max="59" style="width:55px"></div>
      <div class="fg"><label>性别</label>
        <select id="fgender"><option value="女">女</option><option value="男">男</option></select>
      </div>
      <div class="fg"><label>流年</label><input type="number" id="fln" placeholder="今年" style="width:80px"></div>
      <div class="fg"><label title="输入东经度数用于真太阳时修正，可不填">经度(可选)</label><input type="number" id="flo" placeholder="如120.3" step="0.1" style="width:90px"></div>
      <button class="btn" onclick="go()">排盘</button>
      <button class="btn btn2" onclick="demo()">演示盘</button>
    </div>
  </div>
</div>
<div class="status" id="st"></div>
<div class="croute hid" id="cr">
  <div class="info-hdr" id="ih"></div>
  <div class="pgrid-scroll"><div class="pgrid" id="pg"></div></div>
</div>
<div class="awrap hid" id="aw">
  <div class="acard">
    <h2>命盘解读</h2>
    <div class="atabs" id="at"></div>
    <div id="ab"></div>
  </div>
</div>
<script>
const BP={5:{r:1,c:1},6:{r:1,c:2},7:{r:1,c:3},8:{r:1,c:4},
  4:{r:2,c:1},9:{r:2,c:4},3:{r:3,c:1},10:{r:3,c:4},
  2:{r:4,c:1},1:{r:4,c:2},0:{r:4,c:3},11:{r:4,c:4}};
const CP={5:'东南',6:'正南',7:'南偏西',8:'西南',4:'正东',9:'正西',3:'东偏北',10:'西偏北',2:'东北',1:'正北偏东',0:'正北',11:'西北'};
const MS=new Set(['紫微','天机','太阳','武曲','天同','廉贞','天府','太阴','贪狼','巨门','天相','天梁','七杀','破军']);
const SS=new Set(['擎羊','陀罗','火星','铃星','地空','地劫']);
const JS=new Set(['文昌','文曲','天魁','天钺','左辅','右弼']);
const JC={'水二局':'jw','木三局':'jwo','金四局':'jme','土五局':'jea','火六局':'jfi'};
const BRANCHES='子丑寅卯辰巳午未申酉戌亥';
const DIMS={感情:'💕',财运:'💰',事业:'💼',健康:'🏥'};
const HUACSS={化禄:'flu',化权:'fqu',化科:'fke',化忌:'fji'};

function bi(b){return BRANCHES.indexOf(b)}
function sc(n){return MS.has(n)?'main':SS.has(n)?'sha':JS.has(n)?'ji':'aux'}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function st(msg,e=false){const el=document.getElementById('st');el.textContent=msg;el.className='status'+(e?' err':'')}
function scoreClass(s){return s>=75?'hi':s>=55?'md':'lo'}

async function go(){
  const body={year:+document.getElementById('fy').value,month:+document.getElementById('fm').value,
    day:+document.getElementById('fd').value,hour:+document.getElementById('fh').value,
    minute:+document.getElementById('fmin').value,gender:document.getElementById('fgender').value};
  const ln=document.getElementById('fln').value;if(ln)body.liunian_year=+ln;
  const lo=document.getElementById('flo').value;if(lo)body.longitude=+lo;
  st('排盘计算中…');
  try{const r=await fetch('/api/v1/ziwei/full',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!r.ok){const e=await r.json();throw new Error(e.detail||r.statusText)}
    render(await r.json());st('')}catch(e){st('错误: '+e.message,true)}
}
async function demo(){
  st('加载演示盘…');
  try{const r=await fetch('/api/v1/ziwei/demo');if(!r.ok)throw new Error('失败');
    const d=await r.json();
    document.getElementById('fy').value=2002;document.getElementById('fm').value=3;
    document.getElementById('fd').value=13;document.getElementById('fh').value=14;
    document.getElementById('fmin').value=55;document.getElementById('fgender').value='女';
    render(d);st('')}catch(e){st('演示错误: '+e.message,true)}
}

function render(data){
  const{lunar,life_palace_gz,body_palace_gz,wuxing_ju_name,dayun,liunian,gender}=data;
  const life_ruler_star=data.life_ruler_star||'',body_ruler_star=data.body_ruler_star||'',true_solar_time=data.true_solar_time||'';
  const jc=JC[wuxing_ju_name]||'';
  const curY=liunian?liunian.year:new Date().getFullYear();
  let curD=null;
  if(dayun&&dayun.items)for(const d of dayun.items)if(curY>=d.start_year&&curY<d.start_year+10){curD=d;break}

  // ── 信息头栏 ─────────────────────────
  let ihh=`
    <div class="kv"><span class="k">公历</span><span class="v">${data.birth_solar.replace('T',' ')}</span></div>
    <div class="kv"><span class="k">性别</span><span class="v">${gender}</span></div>
    <div class="kv"><span class="k">农历</span><span class="v">${lunar.year_gz}年${lunar.is_leap_month?'<span class="blife" style="font-size:.52rem;padding:1px 3px;margin:0 2px">闰</span>':''}${lunar.lunar_month}月${lunar.lunar_day}日${lunar.hour_branch}时</span></div>
    <div class="kv"><span class="k">命宫</span><span class="v">${life_palace_gz}</span></div>
    <div class="kv"><span class="k">身宫</span><span class="v">${body_palace_gz}</span></div>
    <div class="kv"><span class="k">五行局</span><span class="wbadge ${jc}">${wuxing_ju_name}</span></div>`;
  if(life_ruler_star)ihh+=`<div class="kv"><span class="k">命主</span><span class="v">${life_ruler_star}</span></div>`;
  if(body_ruler_star)ihh+=`<div class="kv"><span class="k">身主</span><span class="v">${body_ruler_star}</span></div>`;
  if(curD)ihh+=`<div class="kv"><span class="k">当前大运</span><span class="v">${curD.ganzhi}(${curD.start_age}岁)</span></div>`;
  if(true_solar_time)ihh+=`<div class="kv"><span class="k">真太阳时</span><span class="v">${true_solar_time}</span></div>`;
  document.getElementById('ih').innerHTML=ihh;

  // ── 宫位格盘 ─────────────────────────
  const g=document.getElementById('pg');g.innerHTML='';
  const bodyB=body_palace_gz.slice(-1);
  const lnLifeB=liunian?liunian.life_palace_branch:-1;
  for(const p of data.palaces){
    const bid=bi(p.branch);const pos=BP[bid];if(!pos)continue;
    const c=document.createElement('div');c.className='pal';
    c.style.gridColumn=pos.c;c.style.gridRow=pos.r;
    const isL=(p.name==='命宫'),isB=(p.branch===bodyB),isLN=(lnLifeB>=0&&bid===lnLifeB);
    let h=`<div class="pname">${p.name}`;
    if(isL)h+=` <span class="blife">命</span>`;
    if(isB)h+=` <span class="bbody">身</span>`;
    if(isLN)h+=` <span class="bln">年</span>`;
    h+=`</div><div class="db">${p.stem}${p.branch}</div><div class="stars">`;
    for(const s of p.main_stars){
      const sia=s.transforms&&s.transforms.length?s.transforms.map(t=>`<span class="shan">${t}</span>`).join(''):'';
      const _bv=(typeof s.brightness_val==='number'&&MS.has(s.name))?s.brightness_val:0;
      const _bs=_bv>0?`<span style="font-size:.5rem;color:#c9963a;letter-spacing:-1px;vertical-align:middle;margin-right:1px" title="${s.brightness}">${'★'.repeat(_bv)}</span>`:'';
      h+=`<div class="sl">${_bs}<span class="sn ${sc(s.name)}">${s.name}</span><span class="sbr">${s.brightness}</span>${sia}</div>`;
    }
    for(const ax of p.aux_stars){
      h+=`<div class="sl"><span class="sn ${sc(ax)}" style="font-size:.7rem">${ax}</span></div>`;
    }
    h+=`</div>`;
    if(p.xiaoxian_ages&&p.xiaoxian_ages.length)h+=`<div class="xage">${p.xiaoxian_ages.join('·')}岁</div>`;
    h+=`<div class="compass">${CP[bid]||''}</div>`;
    c.innerHTML=h;
    if(p.tooltip)c.title=p.tooltip;
    g.appendChild(c);
  }

  // ── 中宫 ─────────────────────────────
  const ctr=document.createElement('div');ctr.className='pcenter';
  ctr.style.gridColumn='2/4';ctr.style.gridRow='2/4';
  let dyh='';
  if(dayun&&dayun.items){
    const dir=dayun.forward?'顺行':'逆行';
    dyh=`<div class="cs"><h3>大运（${dir}·起运${dayun.start_age}岁）</h3><div class="dylist">`;
    for(const d of dayun.items)dyh+=`<div class="dyi${curD&&d.index===curD.index?' cur':''}" title="${d.start_year}年起">${d.ganzhi}<br><small>${d.start_age}岁</small></div>`;
    dyh+=`</div></div>`;
  }
  let lnh='';
  if(liunian){
    const sia=Object.entries(liunian.sihua||{}).map(([s,v])=>`<span class="${HUACSS[v]||''}">${s}${v}</span>`).join(' · ');
    lnh=`<div class="cs"><h3>流年 ${liunian.year_gz}(${liunian.year}年)</h3><div class="lnrow">${sia||'—'}</div></div>`;
  }
  let lyh='';
  if(data.liuyue&&data.liuyue.length){
    const today=new Date(),todayM=today.getMonth()+1,lnY=liunian?liunian.year:today.getFullYear();
    lyh=`<div class="cs"><h3>流月一览</h3><div class="lylist">`;
    for(const lm of data.liuyue){
      const isCM=(lnY===today.getFullYear()&&lm.month===todayM);
      lyh+=`<div class="lyi${isCM?' cur':''}" title="${lm.palace_name}·${lm.month_gz}">${lm.month_name}</div>`;
    }
    lyh+=`</div></div>`;
  }
  const rulerLine=life_ruler_star?`<br>命主：<b>${life_ruler_star}</b>　身主：<b>${body_ruler_star}</b>`:'';
  ctr.innerHTML=`<div class="ct">命盘中宫</div>
    <div class="cs"><h3>命盘信息</h3>
      <div style="font-size:.82rem;line-height:1.9">命宫：<b>${life_palace_gz}</b>　身宫：<b>${body_palace_gz}</b>　<span class="wbadge ${jc}">${wuxing_ju_name}</span>${rulerLine}</div>
    </div>${dyh}${lnh}${lyh}`;
  g.appendChild(ctr);
  document.getElementById('cr').classList.remove('hid');
  renderAna(data);
}

function renderAna(data){
  const aw=document.getElementById('aw');aw.classList.remove('hid');
  const tds=[{id:'sum',l:'命盘摘要'},{id:'pal',l:'逐宫解读'},{id:'dy',l:'大运流月'},{id:'fly',l:'飞星分析'},{id:'fc',l:'运势预测'}];
  document.getElementById('at').innerHTML=tds.map((t,i)=>
    `<button class="tbtn${i===0?' act':''}" data-tid="${t.id}" onclick="swt('${t.id}')">${t.l}</button>`).join('');

  // ── 命盘摘要 ──────────────────────────
  let h=`<div id="tc-sum" class="tc act"><div class="sumcard">${esc(data.summary||'')}</div>`;
  if(data.analysis&&Object.keys(data.analysis).length){
    h+=`<div style="margin-top:12px">`;
    for(const[k,v]of Object.entries(data.analysis))if(v)h+=`<div class="pana"><h4>${esc(k)}</h4><p>${esc(v)}</p></div>`;
    h+=`</div>`;
  }
  h+=`</div>`;

  // ── 逐宫解读 ──────────────────────────
  h+=`<div id="tc-pal" class="tc">`;
  for(const p of data.palaces){
    if(!p.conclusion&&!p.analysis)continue;
    h+=`<div class="pana"><h4>${p.name}·${p.stem}${p.branch}`;
    if(p.opposition_name)h+=` <span style="font-size:.72rem;color:var(--muted);font-weight:400">│ 对宫：${p.opposition_name}</span>`;
    h+=`</h4>`;
    if(p.analysis_tags&&p.analysis_tags.length){
      h+=`<div style="margin-bottom:5px">`;
      for(const t of p.analysis_tags)h+=`<span class="atag">${esc(t)}</span>`;
      h+=`</div>`;
    }
    if(p.conclusion){
      h+=`<div class="pca-c"><span class="lbl">结论</span>${esc(p.conclusion)}</div>`;
    }
    if(p.explanation){
      h+=`<details class="pca-d" open><summary>详细解释 ▸</summary>`;
      h+=`<div class="pca-exp">${esc(p.explanation)}</div>`;
      if(p.suggestion)h+=`<div class="pca-sug"><span class="lbl">💡 建议</span>${esc(p.suggestion)}</div>`;
      h+=`</details>`;
    } else if(p.analysis){
      h+=`<p style="font-size:.83rem;line-height:1.7">${esc(p.analysis)}</p>`;
    }
    h+=`</div>`;
  }
  h+=`</div>`;

  // ── 大运流月 ──────────────────────────
  const curY2=data.liunian?data.liunian.year:new Date().getFullYear();
  h+=`<div id="tc-dy" class="tc">`;
  h+=`<div class="fc-divider">大运列表</div>`;
  h+=`<table class="ftable"><tr><th>#</th><th>干支</th><th>年龄</th><th>起运年</th><th>大运四化</th><th>博士十二流曜</th></tr>`;
  if(data.dayun&&data.dayun.items)for(const d of data.dayun.items){
    const ic=curY2>=d.start_year&&curY2<d.start_year+10;
    const siaStr=Object.entries(d.sihua||{}).map(([s,v])=>`<span class="${HUACSS[v]||''}">${s}${v}</span>`).join(' ');
    const boshiStr=Object.entries(d.boshi_stars||{}).map(([sn,bz])=>`${sn}(${bz})`).join(' ');
    h+=`<tr${ic?' class="tr-cur"':''}><td>${d.index}</td><td><b>${d.ganzhi}</b></td><td>${d.start_age}–${d.end_age}岁</td><td>${d.start_year}</td><td style="font-size:.75rem">${siaStr||'—'}</td><td style="font-size:.7rem;color:var(--muted)">${boshiStr||'—'}</td></tr>`;
  }
  h+=`</table>`;
  if(data.liuyue&&data.liuyue.length){
    const today2=new Date(),todayM2=today2.getMonth()+1,lnY2=data.liunian?data.liunian.year:today2.getFullYear();
    h+=`<div class="fc-divider" style="margin-top:14px">流月一览（${lnY2}年）</div>`;
    h+=`<table class="ftable"><tr><th>月</th><th>月名</th><th>干支</th><th>流月命宫</th><th>四化</th></tr>`;
    for(const lm of data.liuyue){
      const isCM=(lnY2===today2.getFullYear()&&lm.month===todayM2);
      const msiaStr=Object.entries(lm.sihua||{}).map(([s,v])=>`<span class="${HUACSS[v]||''}">${s}${v}</span>`).join(' ');
      h+=`<tr${isCM?' class="tr-cur"':''}><td>${lm.month}</td><td>${lm.month_name}</td><td>${lm.month_gz}</td><td>${lm.palace_name}</td><td style="font-size:.75rem">${msiaStr||'—'}</td></tr>`;
    }
    h+=`</table>`;
  }
  h+=`</div>`;

  // ── 飞星分析 ──────────────────────────
  h+=`<div id="tc-fly" class="tc">`;
  if(data.flying&&data.flying.palaces){
    h+=`<div class="fc-divider">各宫飞出四化</div>`;
    h+=`<table class="ftable"><tr><th>宫位</th><th>宫干</th><th class="flu">化禄</th><th class="fqu">化权</th><th class="fke">化科</th><th class="fji">化忌</th><th>自化</th></tr>`;
    for(const fp of data.flying.palaces){
      const fo=fp.flying_out||{};
      const stArr=fp.self_transforms&&fp.self_transforms.length?fp.self_transforms.join(' · '):'—';
      h+=`<tr><td>${fp.palace_name}${fp.opposition_palace?`<br><span style="font-size:.7rem;color:var(--muted)">↔ ${fp.opposition_palace}</span>`:''}</td>`;
      h+=`<td>${fp.stem_name}</td><td class="flu">${fo['化禄']||'—'}</td><td class="fqu">${fo['化权']||'—'}</td><td class="fke">${fo['化科']||'—'}</td><td class="fji">${fo['化忌']||'—'}</td>`;
      h+=`<td style="font-size:.72rem;color:var(--muted)">${stArr}</td></tr>`;
    }
    h+=`</table>`;
    if(data.flying.received&&Object.keys(data.flying.received).length){
      h+=`<div class="fc-divider" style="margin-top:14px">各宫接收四化汇总</div>`;
      h+=`<table class="ftable"><tr><th>宫位</th><th>接收的四化</th></tr>`;
      for(const[pal,list]of Object.entries(data.flying.received)){
        if(!list||!list.length)continue;
        h+=`<tr><td>${pal}</td><td style="font-size:.75rem;line-height:1.8">${list.map(esc).join('　')}</td></tr>`;
      }
      h+=`</table>`;
    }
    if(data.flying.self_transforms&&data.flying.self_transforms.length){
      h+=`<div class="fc-divider" style="margin-top:14px">全局自化列表</div>`;
      h+=`<div style="font-size:.82rem;line-height:2;padding:6px 0">${data.flying.self_transforms.map(esc).join('　')}</div>`;
    }
    if(data.flying.chonged&&Object.keys(data.flying.chonged).length){
      h+=`<div class="fc-divider" style="margin-top:14px">被对冲汇总（冲入）</div>`;
      h+=`<table class="ftable"><tr><th>宫位</th><th>被冲的四化来源</th></tr>`;
      for(const[pal,list]of Object.entries(data.flying.chonged)){
        if(!list||!list.length)continue;
        h+=`<tr><td>${pal}</td><td style="font-size:.75rem;line-height:1.8">${list.map(esc).join('　')}</td></tr>`;
      }
      h+=`</table>`;
    }
  }else{h+=`<p class="fc-empty">暂无飞星数据</p>`;}
  h+=`</div>`;

  // ── 运势预测 ──────────────────────────
  h+=`<div id="tc-fc" class="tc">${renderForecastTab(data.forecast)}</div>`;

  document.getElementById('ab').innerHTML=h;
}

function swt(id){
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.toggle('act',b.dataset.tid===id));
  ['sum','pal','dy','fly','fc'].forEach(t=>{const el=document.getElementById('tc-'+t);if(el)el.classList.toggle('act',t===id)});
}

function togMonth(i){
  const el=document.getElementById('fc-mb-'+i),arr=document.getElementById('fc-arr-'+i);
  if(el){el.classList.toggle('open');if(arr)arr.textContent=el.classList.contains('open')?'▼':'▶';}
}

function fmtPeriod(pf,isCur){
  let h=`<div class="fc-section${isCur?' fc-cur':''}">`;
  h+=`<h3>${esc(pf.period)}（${esc(pf.ganzhi)}）<span class="fc-palace-tag">${esc(pf.palace_name)}</span> <span class="fc-score ${scoreClass(pf.score)}">${pf.score}分</span></h3>`;
  h+=`<div class="fc-overall">${esc(pf.overall)}</div>`;
  if(pf.events&&pf.events.length){
    h+=`<div class="fc-tags">`;
    for(const ev of pf.events)h+=`<span class="fc-tag lv-${esc(ev.level)}" title="${esc(ev.description)}（${esc(ev.source)}）">${esc(ev.category)}【${esc(ev.level)}】</span>`;
    h+=`</div>`;
  }
  h+=`<div class="fc-grid">`;
  for(const[k,v]of Object.entries(pf.details||{}))h+=`<div class="fc-dim"><b>${DIMS[k]||''} ${esc(k)}</b>${esc(v)}</div>`;
  h+=`</div>`;
  h+=`<div class="fc-advice">${esc(pf.advice)}</div>`;
  h+=`</div>`;
  return h;
}

function renderForecastTab(fc){
  if(!fc)return`<p class="fc-empty">暂无运势数据，请先排盘</p>`;
  const curPeriod=fc.current_month?fc.current_month.period:null;
  let h='';
  // 年运总览
  h+=`<div class="fc-divider">🗓 ${fc.year}年 年运总览</div>`;
  h+=fmtPeriod(fc.yearly,false);
  // 本月高亮
  if(fc.current_month){
    h+=`<div class="fc-divider">📅 本月运势（${esc(fc.current_month.period)}）</div>`;
    h+=fmtPeriod(fc.current_month,true);
  }
  // 十二流月折叠
  h+=`<div class="fc-divider">📆 全年十二流月</div><div class="fc-months">`;
  for(let i=0;i<fc.monthly.length;i++){
    const m=fc.monthly[i];
    const isCur=(curPeriod&&m.period===curPeriod);
    const topEvs=m.events&&m.events.length?m.events.slice(0,3).map(e=>`<span class="fc-tag fc-tag-sm lv-${esc(e.level)}">${esc(e.category)}</span>`).join(''):'';
    h+=`<div class="fc-month${isCur?' fc-cur':''}">`;
    h+=`<div class="fc-mhdr" onclick="togMonth(${i})">`;
    h+=`<span class="fc-arr" id="fc-arr-${i}">${isCur?'▼':'▶'}</span>`;
    h+=`<span class="mn">${esc(m.period)}（${esc(m.ganzhi)}）<span class="fc-palace-tag">${esc(m.palace_name)}</span></span>`;
    h+=`<span class="fc-tag-inline">${topEvs}</span>`;
    h+=`<div class="fc-bar"><div class="fc-bar-fill" style="width:${m.score}%"></div></div>`;
    h+=`<span class="ms">${m.score}分</span></div>`;
    h+=`<div class="fc-mbody${isCur?' open':''}" id="fc-mb-${i}">`;
    if(m.events&&m.events.length){
      h+=`<div class="fc-tags" style="margin-bottom:7px">`;
      for(const ev of m.events)h+=`<span class="fc-tag lv-${esc(ev.level)}" title="${esc(ev.description)}">${esc(ev.category)}【${esc(ev.level)}】</span>`;
      h+=`</div>`;
    }
    h+=`<div class="fc-grid">`;
    for(const[k,v]of Object.entries(m.details||{}))h+=`<div class="fc-dim"><b>${DIMS[k]||''} ${esc(k)}</b>${esc(v)}</div>`;
    h+=`</div><div class="fc-advice">${esc(m.advice)}</div>`;
    h+=`</div></div>`;
  }
  h+=`</div>`;
  return h;
}
</script>
</body>
</html>
