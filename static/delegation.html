<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>权限委托管理</title>
  <style>
    :root {
      --bg: #f6f5f2;
      --panel: #ffffff;
      --text: #0f172a;
      --muted: #667085;
      --line: #e5e7eb;
      --accent: #0f766e;
      --accent-soft: #e0f4f3;
      --warn: #f59e0b;
      --bad: #ef4444;
      --ok: #22c55e;
      --shadow: 0 18px 50px rgba(15,23,42,0.07);
      --radius: 14px;
    }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); font-family:"Manrope","Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; color:var(--text); line-height:1.6; min-height:100vh; }
    header { position:sticky; top:0; z-index:10; backdrop-filter:blur(12px); background:rgba(247,248,245,.92); border-bottom:1px solid var(--line); padding:14px 18px; display:flex; align-items:center; gap:12px; }
    header h1 { margin:0; font-size:18px; }
    .shell { max-width:1100px; margin:0 auto; padding:18px; }
    .card { background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:16px; box-shadow:var(--shadow); margin-bottom:14px; }
    .card-title { margin:0 0 12px; font-size:13px; color:var(--muted); letter-spacing:.04em; font-weight:700; text-transform:uppercase; display:flex; align-items:center; gap:8px; }
    .card-title .dot { width:7px; height:7px; border-radius:50%; background:var(--accent); display:inline-block; }
    .row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    .grid2 { display:grid; gap:14px; }
    @media (min-width:800px){ .grid2 { grid-template-columns:1fr 1fr; } }
    .pill { display:inline-flex; align-items:center; gap:6px; padding:5px 9px; border-radius:999px; border:1px solid var(--line); background:#f8fafc; color:var(--muted); font-size:12px; }
    .pill.accent { border-color:rgba(15,118,110,.4); color:#0f766e; background:var(--accent-soft); }
    .pill.ok { border-color:rgba(34,197,94,.35); color:#166534; background:#ecfdf3; }
    .pill.warn { border-color:rgba(245,158,11,.35); color:#92400e; background:#fff7ed; }
    .pill.bad { border-color:rgba(239,68,68,.35); color:#991b1b; background:#fef2f2; }
    .pill.gray { border-color:rgba(148,163,184,.4); color:#475569; background:#e2e8f0; }
    button { border:1px solid var(--line); background:#f8fafc; color:var(--text); padding:8px 14px; border-radius:10px; cursor:pointer; font-weight:600; transition:transform .08s,box-shadow .12s,border-color .12s; font-size:13px; }
    button:hover { border-color:var(--accent); box-shadow:0 6px 18px rgba(15,23,42,.07); }
    button.primary { background:var(--accent); color:#ecfeff; border-color:#0f766e; }
    button.danger { background:#ef4444; color:#fff; border-color:#dc2626; }
    input, select, textarea { width:100%; border:1px solid var(--line); border-radius:10px; padding:8px 10px; font-size:14px; background:#fff; color:var(--text); margin-bottom:8px; }
    input:focus, select:focus, textarea:focus { outline:none; border-color:var(--accent); }
    label { font-size:13px; font-weight:600; color:var(--muted); display:block; margin-bottom:3px; }
    table { width:100%; border-collapse:collapse; font-size:13px; }
    th { text-align:left; color:var(--muted); font-weight:600; font-size:12px; padding:8px 10px; border-bottom:1px solid var(--line); }
    td { padding:8px 10px; border-bottom:1px solid var(--line); vertical-align:middle; }
    tr:last-child td { border-bottom:none; }
    tr:hover td { background:#f9fafb; }
    .empty { color:var(--muted); font-size:13px; padding:20px; text-align:center; }
    #toast { position:fixed; bottom:24px; right:24px; padding:10px 16px; border-radius:10px; background:#0f172a; color:#fff; font-size:13px; display:none; z-index:99; max-width:320px; }
    #toast.ok { background:#166534; }
    #toast.err { background:#991b1b; }
  </style>
</head>
<body>
<header>
  <h1>权限委托管理</h1>
  <div style="margin-left:auto;" class="row">
    <a class="pill accent" href="/static/dashboard.html">← 返回总览</a>
    <span class="pill gray" id="current-user-badge">未登录</span>
  </div>
</header>

<div id="toast"></div>

<div class="shell">

  <!-- 未登录提示 -->
  <div id="no-auth-tip" class="card" style="display:none;">
    <p style="color:var(--bad);font-weight:700;">未检测到登录 Token。</p>
    <p class="hint">请在 localStorage 中存入 <code>access_token</code>，或在 URL 加 <code>?token=&lt;your_token&gt;</code> 后刷新。</p>
  </div>

  <!-- 发起申请表单 -->
  <div class="card" id="request-form-card">
    <p class="card-title"><span class="dot"></span>发起权限申请</p>
    <div style="max-width:480px;">
      <label>权限类型</label>
      <select id="req-perm-type">
        <option value="view">view — 只读</option>
        <option value="edit" selected>edit — 读写</option>
        <option value="share">share — 可再委托</option>
        <option value="manage">manage — 完整管理</option>
      </select>
      <label>有效天数</label>
      <input id="req-expires" type="number" value="30" min="1" max="365" />
      <label>申请理由（可选）</label>
      <textarea id="req-reason" rows="2" placeholder="简述申请原因…"></textarea>
      <button class="primary" onclick="submitRequest()">提交申请</button>
    </div>
  </div>

  <!-- 我的申请列表 -->
  <div class="card">
    <p class="card-title"><span class="dot"></span>我的委托（收到的）</p>
    <div id="incoming-list"><span class="empty">加载中…</span></div>
  </div>

  <!-- 我发出的 -->
  <div class="card">
    <p class="card-title"><span class="dot"></span>我授出的委托</p>
    <div id="outgoing-list"><span class="empty">加载中…</span></div>
  </div>

  <!-- 管理员：待审批列表 -->
  <div class="card" id="admin-panel" style="display:none;">
    <p class="card-title"><span class="dot"></span>待审批申请（管理员视图）</p>
    <div id="pending-list"><span class="empty">加载中…</span></div>
  </div>

</div>

<script>
/* ════════════════════════════════════════════ 工具函数 ═══════════════════════════════════════════ */
function getToken() {
  return localStorage.getItem('access_token') || localStorage.getItem('token')
       || sessionStorage.getItem('access_token')
       || new URLSearchParams(location.search).get('token');
}

function authHeaders() {
  return { Authorization: 'Bearer ' + getToken(), 'Content-Type': 'application/json' };
}

function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = type;
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 3000);
}

function statusPill(status) {
  const map = { pending:'warn', approved:'ok', rejected:'bad', revoked:'gray' };
  const label = { pending:'待审批', approved:'已批准', rejected:'已拒绝', revoked:'已撤销' };
  return `<span class="pill ${map[status]||'gray'}">${label[status]||status}</span>`;
}

function permLabel(p) {
  const m = { view:'只读', edit:'读写', share:'可委托', manage:'管理员' };
  return m[p] || p;
}

/* ════════════════════════════════════════════ 初始化 ═══════════════════════════════════════════ */
const token = getToken();
if (!token) {
  document.getElementById('no-auth-tip').style.display = '';
  document.getElementById('current-user-badge').textContent = '未登录';
} else {
  init();
}

async function init() {
  try {
    const me = await apiFetch('/api/v1/auth/me');
    document.getElementById('current-user-badge').textContent = me.username || '已登录';
    if (me.is_admin) {
      document.getElementById('admin-panel').style.display = '';
      loadPending();
    }
  } catch(e) { /* 忽略 */ }

  loadIncoming();
  loadOutgoing();
}

async function apiFetch(url, opts={}) {
  const r = await fetch(url, { ...opts, headers: { ...authHeaders(), ...(opts.headers||{}) } });
  if (!r.ok) {
    const text = await r.text();
    throw new Error(`HTTP ${r.status}: ${text}`);
  }
  return r.json();
}

/* ════════════════════════════════════════════ 数据加载 ═══════════════════════════════════════════ */
async function loadIncoming() {
  const el = document.getElementById('incoming-list');
  try {
    const data = await apiFetch('/api/v1/delegations/incoming');
    const rows = data.delegations || [];
    if (!rows.length) { el.innerHTML = '<p class="empty">暂无收到的委托</p>'; return; }
    el.innerHTML = `<table>
      <thead><tr><th>ID</th><th>授权方</th><th>权限</th><th>状态</th><th>到期</th></tr></thead>
      <tbody>${rows.map(d=>`<tr>
        <td>#${d.id}</td>
        <td>${d.from_user_id||'—'}</td>
        <td><span class="pill accent">${permLabel(d.permission_type)}</span></td>
        <td>${statusPill(d.status||'approved')}</td>
        <td class="hint">${d.expires_at ? d.expires_at.slice(0,10) : '永久'}</td>
      </tr>`).join('')}</tbody>
    </table>`;
  } catch(e) { el.innerHTML = `<p class="empty" style="color:var(--bad);">加载失败</p>`; }
}

async function loadOutgoing() {
  const el = document.getElementById('outgoing-list');
  try {
    const data = await apiFetch('/api/v1/delegations/outgoing');
    const rows = data.delegations || [];
    if (!rows.length) { el.innerHTML = '<p class="empty">暂无授出的委托</p>'; return; }
    el.innerHTML = `<table>
      <thead><tr><th>ID</th><th>受权方</th><th>权限</th><th>状态</th><th>操作</th></tr></thead>
      <tbody>${rows.map(d=>`<tr>
        <td>#${d.id}</td>
        <td>${d.to_user_id||'—'}</td>
        <td><span class="pill accent">${permLabel(d.permission_type)}</span></td>
        <td>${statusPill(d.status||'approved')}</td>
        <td><button onclick="revokeOld(${d.id})" title="撤销旧式委托">撤销</button></td>
      </tr>`).join('')}</tbody>
    </table>`;
  } catch(e) { el.innerHTML = `<p class="empty" style="color:var(--bad);">加载失败</p>`; }
}

async function loadPending() {
  /* 管理员查看 status=pending 的申请（通过 /delegations/incoming 或专属接口） */
  const el = document.getElementById('pending-list');
  try {
    /* 尝试调用管理员全量查询；若无则 fallback 到 incoming */
    let rows = [];
    /* 直接通过 /incoming 过滤 pending 状态（无独立 /pending 端点） */
    const _pd = await apiFetch('/api/v1/delegations/incoming');
    rows = (_pd.delegations || []).filter(d => d.status === 'pending');
    if (!rows.length) { el.innerHTML = '<p class="empty">暂无待审批申请</p>'; return; }
    el.innerHTML = `<table>
      <thead><tr><th>ID</th><th>申请人</th><th>权限</th><th>申请时间</th><th>操作</th></tr></thead>
      <tbody>${rows.map(d=>`<tr>
        <td>#${d.id}</td>
        <td>用户 #${d.requested_by||d.to_user_id||'?'}</td>
        <td><span class="pill accent">${permLabel(d.permission_type)}</span></td>
        <td class="hint">${(d.created_at||'').slice(0,16)}</td>
        <td class="row" style="gap:6px;">
          <button class="primary" onclick="approveReq(${d.id})">批准</button>
          <button class="danger" onclick="rejectReq(${d.id})">拒绝</button>
        </td>
      </tr>`).join('')}</tbody>
    </table>`;
  } catch(e) { el.innerHTML = `<p class="empty" style="color:var(--bad);">加载失败</p>`; }
}

/* ════════════════════════════════════════════ 操作 ═══════════════════════════════════════════ */
async function submitRequest() {
  const permType = document.getElementById('req-perm-type').value;
  const expires  = parseInt(document.getElementById('req-expires').value, 10) || 30;
  try {
    const d = await apiFetch('/api/v1/permissions/request', {
      method: 'POST',
      body: JSON.stringify({ permission_type: permType, expires_days: expires }),
    });
    toast(`✓ 申请已提交（#${d.id}），等待审批`, 'ok');
    loadIncoming();
  } catch(e) { toast('申请失败：' + e.message, 'err'); }
}

async function approveReq(id) {
  try {
    await apiFetch(`/api/v1/permissions/request/${id}/approve`, { method: 'PUT' });
    toast(`✓ 已批准申请 #${id}`, 'ok');
    loadPending();
    loadIncoming();
  } catch(e) { toast('批准失败：' + e.message, 'err'); }
}

async function rejectReq(id) {
  const reason = prompt('请输入拒绝理由（可空）：') ?? '';
  try {
    await apiFetch(`/api/v1/permissions/request/${id}/reject`, {
      method: 'PUT',
      body: JSON.stringify({ reject_reason: reason }),
    });
    toast(`已拒绝申请 #${id}`, 'ok');
    loadPending();
  } catch(e) { toast('拒绝失败：' + e.message, 'err'); }
}

async function revokeApproved(id) {
  if (!confirm(`确认撤销委托 #${id}？此操作不可恢复。`)) return;
  try {
    await apiFetch(`/api/v1/permissions/request/${id}/revoke`, { method: 'DELETE' });
    toast(`✓ 委托 #${id} 已撤销`, 'ok');
    loadIncoming();
    loadPending();
  } catch(e) { toast('撤销失败：' + e.message, 'err'); }
}

async function revokeOld(id) {
  if (!confirm(`确认撤销委托 #${id}？`)) return;
  try {
    await apiFetch(`/api/v1/delegations/${id}`, { method: 'DELETE' });
    toast(`✓ 委托 #${id} 已撤销`, 'ok');
    loadOutgoing();
  } catch(e) { toast('撤销失败：' + e.message, 'err'); }
}
</script>
</body>
</html>
