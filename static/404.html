<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Not Found</title>
  <style>
    body { margin:0; font-family: system-ui,-apple-system,"Segoe UI",sans-serif; background:#0b1224; color:#e9ecf4; display:flex; align-items:center; justify-content:center; height:100vh; }
    .box { text-align:center; padding:24px 28px; border:1px solid #1e2f52; border-radius:12px; background:#111a33; box-shadow:0 10px 30px rgba(0,0,0,.25); max-width:360px; }
    h1 { margin:0 0 8px; font-size:22px; letter-spacing:1px; }
    p { margin:6px 0; color:#9aa6bf; font-size:14px; }
    a { color:#7dd3fc; text-decoration:none; }
    a:hover { text-decoration:underline; }
  </style>
</head>
<body>
  <div class="box">
    <h1>404</h1>
    <p>页面未找到。请检查路径或返回主页。</p>
    <p><a href="/static/app/">回到主页</a></p>
  </div>
</body>
</html>
