name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

env:
  AUTH_BYPASS: "true"
  SECRET_KEY: "ci-test-secret-key-at-least-32bytes-long"

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Quality gate frontend checks
        run: make quality-gate-frontend

      - name: Install Playwright browsers
        run: cd frontend && npx playwright install chromium --with-deps

      - name: E2E smoke tests
        run: cd frontend && npm run test:e2e

      - name: Compare live design targets (R079)
        run: node scripts/compare-live-targets.mjs

  autopilot:
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Install Playwright browsers
        run: cd frontend && npx playwright install chromium --with-deps

      - name: Autopilot full bundle (W102-P3-02 · S2 alignment)
        run: python scripts/auto_verify_autopilot.py

      - name: Upload autopilot report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autopilot-verify-latest
          path: docs/reports/autopilot-verify-latest.json
          if-no-files-found: ignore

  lint:
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Type check (pyright)
        run: pyright --project pyrightconfig.json

      - name: Security scan (bandit)
        run: make security

  test:
    runs-on: ubuntu-latest
    needs: [frontend, lint, autopilot]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Quality gate backend checks
        run: make quality-gate-backend

      - name: W14 auto verify bundle
        run: python scripts/auto_verify_w14.py

      - name: Volume names aligned
        run: make verify-volume-names

      - name: OpenAPI export drift check
        run: |
          python scripts/export_openapi.py
          git diff --exit-code docs/openapi.json || (
            echo "::error::docs/openapi.json out of sync — run: make export-openapi && make sync-frontend-types"
            exit 1
          )

      - name: Frontend OpenAPI types drift check
        run: |
          cd frontend && npm run gen:types
          git diff --exit-code src/api/schema.d.ts || (
            echo "::error::schema.d.ts out of sync — run: make sync-frontend-types"
            exit 1
          )

      - name: Run tests (excluding legacy)
        run: make test-fast

      - name: Dev cycle quick (W102-20 · content advisory)
        run: python scripts/dev_cycle.py --quick
        continue-on-error: true

      - name: Surface levels A45 (advisory · TD-18)
        run: python scripts/verify_surface_levels.py
        continue-on-error: true

      - name: Upload dev-cycle reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dev-cycle-reports
          path: |
            docs/reports/dev-cycle-latest.json
            docs/reports/content-hollowness-audit-latest.json
          if-no-files-found: ignore

      - name: sxtwl tests (best-effort)
        run: |
          python - <<'PY'
          import importlib.util, sys, subprocess
          if importlib.util.find_spec("sxtwl") is None:
              print("sxtwl not available; skipping")
              sys.exit(0)
          print("sxtwl available; running sxtwl-marked tests")
          subprocess.check_call([sys.executable, "-m", "pytest", "-q", "-m", "sxtwl"])
          PY

      - name: Golden runner (non-blocking)
        run: python run_cases.py
        continue-on-error: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: iztro cross-check (advisory)
        run: make verify-iztro
        continue-on-error: true

      - name: iztro youbi hour cross-check (advisory)
        run: make verify-iztro-hour
        continue-on-error: true

      - name: Wenmo horoscope diff (advisory, R111)
        run: make verify-wenmo-horoscope
        continue-on-error: true

      - name: Wenmo bazi diff (advisory, R111)
        run: make verify-wenmo-bazi
        continue-on-error: true

  test-postgres:
    runs-on: ubuntu-latest
    needs: [frontend, lint, autopilot]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bazi
          POSTGRES_PASSWORD: bazi_ci
          POSTGRES_DB: bazi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bazi"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: "postgresql://bazi:bazi_ci@localhost:5432/bazi_test"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Alembic upgrade head (PostgreSQL)
        run: alembic upgrade head

      - name: Quality gate backend checks
        run: make quality-gate-backend

      - name: Run tests against PostgreSQL
        run: make test-fast

  docker-build:
    runs-on: ubuntu-latest
    needs: [test, autopilot]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t bazi-api:ci .
