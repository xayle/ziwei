name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

env:
  AUTH_BYPASS: "true"
  SECRET_KEY: "ci-test-secret-key-at-least-32bytes-long"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyright

      - name: Type check (pyright)
        run: pyright --project pyrightconfig.json

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests (excluding legacy)
        run: |
          # N4.07: tests/legacy/ 存在时才追加 --ignore，避免目录不存在时静默失败
          IGNORE_LEGACY=""
          if [ -d "tests/legacy" ]; then
            IGNORE_LEGACY="--ignore=tests/legacy"
          fi
          python -m pytest -q $IGNORE_LEGACY

      - name: sxtwl tests (best-effort)
        run: |
          python - <<'PY'
          import importlib.util, sys, subprocess
          if importlib.util.find_spec("sxtwl") is None:
              print("sxtwl not available; skipping")
              sys.exit(0)
          print("sxtwl available; running sxtwl-marked tests")
          subprocess.check_call([sys.executable, "-m", "pytest", "-q", "-m", "sxtwl"])
          PY

      - name: Golden runner (non-blocking)
        run: python run_cases.py
        continue-on-error: true

  test-postgres:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bazi
          POSTGRES_PASSWORD: bazi_ci
          POSTGRES_DB: bazi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bazi"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: "postgresql://bazi:bazi_ci@localhost:5432/bazi_test"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install psycopg2-binary

      - name: Alembic upgrade head (PostgreSQL)
        run: alembic upgrade head

      - name: Run tests against PostgreSQL
        run: |
          IGNORE_LEGACY=""
          if [ -d "tests/legacy" ]; then
            IGNORE_LEGACY="--ignore=tests/legacy"
          fi
          python -m pytest -q $IGNORE_LEGACY

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t bazi-api:ci .

