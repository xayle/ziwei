name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

env:
  AUTH_BYPASS: "true"
  SECRET_KEY: "ci-test-secret-key-at-least-32bytes-long"

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Quality gate frontend checks
        run: make quality-gate-frontend

      - name: Install Playwright browsers
        run: cd frontend && npx playwright install chromium --with-deps

      - name: E2E smoke tests
        run: cd frontend && npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report/
            frontend/test-results/
          if-no-files-found: ignore

      - name: Compare live design targets (R079)
        run: node scripts/compare-live-targets.mjs

  autopilot:
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Install Playwright browsers
        run: cd frontend && npx playwright install chromium --with-deps

      - name: Install ripgrep (autopilot A07 debt scan)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ripgrep

      - name: Autopilot full bundle (W102-P3-02 · S2 alignment)
        run: python scripts/auto_verify_autopilot.py

      - name: Show failed autopilot checks
        if: failure()
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          p = Path("docs/reports/autopilot-verify-latest.json")
          if not p.is_file():
              print("no autopilot report")
              raise SystemExit(0)
          d = json.loads(p.read_text(encoding="utf-8"))
          lines = [f"pass={d.get('pass')} summary={d.get('summary')}"]
          fails = []
          for track in ("engineering", "aesthetic"):
              for cid, item in sorted((d.get(track) or {}).items()):
                  if isinstance(item, dict) and item.get("ok") is False:
                      detail = (item.get("detail") or "").replace("\n", " ")[-500:]
                      row = f"FAIL {cid} {item.get('name')}: {detail}"
                      fails.append(row)
                      lines.append(row)
                      # GitHub Actions annotation (visible without downloading logs)
                      print(f"::error title=Autopilot {cid}::{row[:200]}")
          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          fail_lines = [f"- `{x}`" for x in fails] if fails else ["(none)"]
          body = "\n".join(["## Autopilot failures", "", *fail_lines, ""])
          if summary_path:
              with open(summary_path, "a", encoding="utf-8") as fh:
                  fh.write(body)
          print("\n".join(lines))
          PY

      - name: Upload autopilot report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autopilot-verify-latest
          path: docs/reports/autopilot-verify-latest.json
          if-no-files-found: ignore

  lint:
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Type check (pyright)
        # 存量类型债：测试/迁移已从 pyrightconfig 排除；生产路径仍有历史 error，暂不阻断 CI。
        # 跟踪：docs/DEV-AUDIT 中 pyright/TD 条目；目标恢复零 error 后去掉 continue-on-error。
        run: pyright --project pyrightconfig.json
        continue-on-error: true

      - name: Security scan (bandit)
        run: make security

  test:
    runs-on: ubuntu-latest
    needs: [frontend, lint, autopilot]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Quality gate backend checks
        run: make quality-gate-backend

      - name: W14 auto verify bundle
        env:
          # test job 有 npm ci 但未装 Playwright 浏览器；E2E 由 frontend/autopilot 闸门覆盖
          W14_SKIP_E2E: "1"
        run: python scripts/auto_verify_w14.py

      - name: Volume names aligned
        run: make verify-volume-names

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps (OpenAPI types)
        run: cd frontend && npm ci

      - name: OpenAPI export drift check
        run: |
          python scripts/export_openapi.py
          git diff --exit-code docs/openapi.json || (
            echo "::error::docs/openapi.json out of sync — run: make export-openapi && make sync-frontend-types"
            exit 1
          )

      - name: Frontend OpenAPI types drift check
        run: |
          cd frontend && npm run gen:types
          git diff --exit-code src/api/schema.d.ts || (
            echo "::error::schema.d.ts out of sync — run: make sync-frontend-types"
            exit 1
          )

      - name: Run tests (excluding legacy)
        # CI 勿用 -n auto：共享 SQLite 会在 xdist worker 下锁库导致 exit 2；autopilot A23 已串行覆盖
        run: python -m pytest -q --ignore=tests/e2e --ignore=tests/legacy

      - name: Dev cycle quick (W102-20 · content advisory)
        run: python scripts/dev_cycle.py --quick
        continue-on-error: true

      - name: Surface levels A45 (advisory · TD-18)
        run: python scripts/verify_surface_levels.py
        continue-on-error: true

      - name: Relation PDF HTML gate (blocking · R086 T123)
        run: python scripts/verify_relation_pdf_html.py

      - name: Upload dev-cycle reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dev-cycle-reports
          path: |
            docs/reports/dev-cycle-latest.json
            docs/reports/content-hollowness-audit-latest.json
            docs/reports/relation-pdf-html-check-latest.json
          if-no-files-found: ignore

      - name: sxtwl tests (best-effort)
        run: |
          python - <<'PY'
          import importlib.util, sys, subprocess
          if importlib.util.find_spec("sxtwl") is None:
              print("sxtwl not available; skipping")
              sys.exit(0)
          print("sxtwl available; running sxtwl-marked tests")
          subprocess.check_call([sys.executable, "-m", "pytest", "-q", "-m", "sxtwl"])
          PY

      - name: Golden runner (non-blocking)
        run: python run_cases.py
        continue-on-error: true

      - name: iztro cross-check (advisory)
        run: make verify-iztro
        continue-on-error: true

      - name: iztro youbi hour cross-check (advisory)
        run: make verify-iztro-hour
        continue-on-error: true

      - name: Wenmo horoscope diff (advisory, R111)
        run: make verify-wenmo-horoscope
        continue-on-error: true

      - name: Wenmo bazi diff (advisory, R111)
        run: make verify-wenmo-bazi
        continue-on-error: true

  test-postgres:
    runs-on: ubuntu-latest
    needs: [frontend, lint, autopilot]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bazi
          POSTGRES_PASSWORD: bazi_ci
          POSTGRES_DB: bazi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bazi"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: "postgresql+psycopg2://bazi:bazi_ci@127.0.0.1:5432/bazi_test"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Alembic upgrade head (PostgreSQL)
        run: python scripts/ci_pg_migrate.py

      - name: Quality gate backend checks
        run: make quality-gate-backend

      - name: Run tests against PostgreSQL
        run: python -m pytest -q --ignore=tests/e2e --ignore=tests/legacy

  docker-build:
    runs-on: ubuntu-latest
    needs: [test, autopilot]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t bazi-api:ci .
