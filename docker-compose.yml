# ============================================================================
# BaZi API v8.0 - Docker Compose 配置
# 支持开发和生产环境
# ============================================================================

services:
  app:
    # ========================================================================
    # 应用配置
    # ========================================================================
    image: bazi:v8.0
    build:
      context: .
      dockerfile: Dockerfile
    
    container_name: bazi-api
    
    # 端口映射
    ports:
      - "${API_PORT:-8000}:8000"
    
    # 环境变量
    environment:
      # Python配置
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1
      
      # 应用配置
      TZ: Asia/Shanghai
      
      # Uvicorn配置
      UVICORN_WORKERS: "${UVICORN_WORKERS:-4}"
      UVICORN_LOG_LEVEL: "${UVICORN_LOG_LEVEL:-info}"
      
      # 数据库配置 (可选，默认SQLite)
      DB_PATH: "${DB_PATH:-/app/data/mingli.db}"
      
      # 引擎路由开关 (M1任务1.23: M1完成后切为 true)
      ENGINE_V2: "${ENGINE_V2:-true}"
      
      # API配置
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173}"
    
    # 卷挂载 (用于数据持久化)
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    
    # 重启策略
    restart: unless-stopped
    
    # 资源限制 (生产环境推荐)
    deploy:
      resources:
        limits:
          cpus: "${DEPLOY_CPU_LIMIT:-2}"
          memory: "${DEPLOY_MEMORY_LIMIT:-512M}"
        reservations:
          cpus: "${DEPLOY_CPU_RESERVE:-0.5}"
          memory: "${DEPLOY_MEMORY_RESERVE:-256M}"
    
    # 健康检查
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# N4.02 — PostgreSQL 服务（生产/CI 使用）
  db:
    image: postgres:16-alpine
    container_name: bazi-postgres
    environment:
      POSTGRES_USER: bazi
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-bazi_dev_pass}"
      POSTGRES_DB: bazi
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bazi"]
      interval: 10s
      timeout: 5s
      retries: 5

# ============================================================================
# 网络配置
# ============================================================================
networks:
  default:
    driver: bridge

volumes:
  pg_data:
