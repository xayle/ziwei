[pytest]
# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization
markers =
    sxtwl: tests that require the sxtwl backend to be installed
    cnlunar: tests that require the cnlunar backend to be installed
    integration: marks tests as integration tests (slow, requires database)
    slow: marks tests as slow (deselect with '-m "not slow"')
    benchmark: marks tests as performance benchmarks
    auth: marks tests related to authentication
    api: marks tests for API endpoints
    services: marks tests for service layer
    models: marks tests for database models

# Test configuration
addopts = 
    -v
    --strict-markers
    --tb=short

# Filter known third-party warnings that cannot be fixed in our code
filterwarnings =
    # slowapi uses deprecated asyncio.iscoroutinefunction on Python 3.14
    ignore::DeprecationWarning:slowapi
    ignore:asyncio.iscoroutinefunction:DeprecationWarning
    # datetime.utcnow() deprecation (stdlib internal)
    ignore:datetime.utcnow:DeprecationWarning
    ignore:datetime.datetime.utcnow:DeprecationWarning
    # Starlette HTTP_422 constant rename
    ignore:'HTTP_422_UNPROCESSABLE_ENTITY':DeprecationWarning
    # cnlunar uses SQLite with unclosed connections — third-party, not fixable
    ignore::ResourceWarning:cnlunar
    # SQLAlchemy unclosed connection ResourceWarnings in test teardown
    ignore::ResourceWarning:sqlalchemy
    # pytest unraisable-exception hook fires ResourceWarning during gc teardown
    ignore::ResourceWarning:_pytest
    # pytest return-not-None in legacy test files
    ignore::pytest.PytestReturnNotNoneWarning

# Logging
log_cli = false
log_level = INFO
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeout for tests (optional - requires pytest-timeout)
# timeout = 300

# Python path: ensure project root is importable (fixes "No module named 'run'" in new shells)
pythonpath = .

# Minimum Python version
minversion = 3.10
