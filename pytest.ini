[pytest]
# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization
markers =
    sxtwl: tests that require the sxtwl backend to be installed
    cnlunar: tests that require the cnlunar backend to be installed
    integration: marks tests as integration tests (slow, requires database)
    slow: marks tests as slow (deselect with '-m "not slow"')
    benchmark: marks tests as performance benchmarks
    auth: marks tests related to authentication
    api: marks tests for API endpoints
    services: marks tests for service layer
    models: marks tests for database models

# Test configuration
addopts = 
    -v
    --strict-markers
    --tb=short

# Filter known third-party deprecation warnings that cannot be fixed in our code
filterwarnings =
    ignore::DeprecationWarning:slowapi
    ignore:asyncio.iscoroutinefunction:DeprecationWarning
    ignore:datetime.utcnow:DeprecationWarning
    ignore:datetime.datetime.utcnow:DeprecationWarning
    ignore:'HTTP_422_UNPROCESSABLE_ENTITY':DeprecationWarning

# Logging
log_cli = false
log_level = INFO
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeout for tests (optional - requires pytest-timeout)
# timeout = 300

# Python path: ensure project root is importable (fixes "No module named 'run'" in new shells)
pythonpath = .

# Minimum Python version
minversion = 3.10
